<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}APT Threat Hunting Platform{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.7" defer></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .sev-critical { background: #dc2626; color: white; }
    .sev-high     { background: #ea580c; color: white; }
    .sev-medium   { background: #d97706; color: white; }
    .sev-low      { background: #65a30d; color: white; }
    .status-open         { color: #fbbf24; }
    .status-acknowledged { color: #94a3b8; }
    .status-active       { color: #22c55e; }
    .status-blocked      { color: #ef4444; }
    .status-revoked      { color: #6b7280; }
    table { font-size: 13px; }
    table th { background: #1e293b; color: #94a3b8; text-transform: uppercase;
                font-size: 11px; padding: 8px 10px; text-align: left; }
    table td { padding: 8px 10px; border-bottom: 1px solid #1e293b; }
    table tr:hover td { background: #1e293b; }
    .panel { background: #1e293b; padding: 16px; border-radius: 6px; }
    button, .btn {
      background: #3b82f6; color: white; padding: 6px 14px; border-radius: 4px;
      font-size: 13px; font-weight: 500; cursor: pointer; border: none;
    }
    button:hover, .btn:hover { background: #2563eb; }
    .btn-secondary { background: #334155; }
    .btn-secondary:hover { background: #475569; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    input, select, textarea {
      background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
      padding: 6px 10px; border-radius: 4px; font-size: 13px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #3b82f6;
    }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="bg-slate-900 border-b border-slate-700 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <h1 class="text-lg font-bold text-slate-100">APT Threat Hunting Platform</h1>
      <nav class="flex gap-4">
        <a href="/dashboard"        class="text-sm {% if active=='home' %}text-blue-400 font-semibold{% else %}text-slate-300{% endif %}">Home</a>
        <a href="/dashboard/alerts" class="text-sm {% if active=='alerts' %}text-blue-400 font-semibold{% else %}text-slate-300{% endif %}">Alerts</a>
        <a href="/dashboard/fleet"  class="text-sm {% if active=='fleet' %}text-blue-400 font-semibold{% else %}text-slate-300{% endif %}">Fleet</a>
        <a href="/dashboard/graph"  class="text-sm {% if active=='graph' %}text-blue-400 font-semibold{% else %}text-slate-300{% endif %}">Attack Graph</a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      {% if user %}
      <span class="text-xs text-slate-400">
        signed in as <span class="text-slate-200 font-mono">{{ user.username }}</span>
        <span class="pill bg-slate-700 text-slate-200" style="margin-left:6px;">{{ user.role.value }}</span>
      </span>
      <form method="post" action="/auth/logout" style="display:inline;">
        <button class="btn-secondary" type="submit">Logout</button>
      </form>
      {% endif %}
    </div>
  </header>

  <main class="p-6 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
