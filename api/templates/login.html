<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — APT Threat Hunting Platform</title>
  <link rel="icon" href="/static/img/icon-app.png">
  <script>
    (function () {
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('theme') || 'auto';
      } catch (e) { document.documentElement.dataset.theme = 'auto'; }
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="/static/app.css">
  <style>
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background:
        url('/static/img/watermark-pattern.png') center / 480px no-repeat,
        var(--bg-0);
      background-blend-mode: lighten;
    }
    :root[data-theme="light"] body,
    :root[data-theme="auto"] body { /* same — watermark sits at low opacity */ }
    .watermark {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background: url('/static/img/watermark-pattern.png') center / 520px repeat;
      opacity: 0.06;
    }
    .login-card {
      position: relative; z-index: 1;
      background: var(--bg-2);
      border: 1px solid var(--border-1);
      border-radius: var(--r-4);
      box-shadow: var(--shadow-3);
      padding: 32px;
      width: 380px;
      max-width: calc(100vw - 32px);
    }
    .brand-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .brand-row img { width: 40px; height: 40px; border-radius: 8px; }
    .brand-title { font: 700 16px var(--font-sans); color: var(--fg-1); }
    .brand-sub { font: 500 11px var(--font-sans); color: var(--fg-3);
                  text-transform: uppercase; letter-spacing: 0.08em; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .error-banner {
      background: var(--critical-bg);
      border: 1px solid var(--critical);
      color: var(--critical);
      padding: 8px 12px;
      border-radius: var(--r-2);
      font: 500 13px var(--font-sans);
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="watermark"></div>
  <div class="login-card">
    <div class="brand-row">
      <img src="/static/img/icon-dark.png" alt="">
      <div>
        <div class="brand-title">APT Threat Hunting Platform</div>
        <div class="brand-sub">Sign in</div>
      </div>
    </div>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/login">
      <input type="hidden" name="next" value="{{ next }}">

      <div class="field">
        <label class="field-label">Username</label>
        <input class="input" type="text" name="username" autofocus required>
      </div>

      <div class="field">
        <label class="field-label">API key</label>
        <input class="input" type="password" name="api_key" required>
      </div>

      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center;">
        Sign in
      </button>
    </form>

    <p style="font:500 11px var(--font-sans); color:var(--fg-3); margin-top:20px; text-align:center;">
      Don't have an API key? Contact your platform administrator.
    </p>
  </div>
</body>
</html>
