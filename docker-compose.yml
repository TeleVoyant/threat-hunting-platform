# ══════════════════════════════════════════════════════════════
# APT Threat Hunting Platform — Docker Compose Deployment
# ══════════════════════════════════════════════════════════════
#
# USAGE:
#   First time setup:
#     cp .env.example .env        # Edit with real values
#     mkdir -p secrets
#     echo "your-jwt-secret" > secrets/jwt_secret.txt
#     echo "your-wazuh-pass" > secrets/wazuh_api_password.txt
#     echo "your-signing-key" > secrets/model_signing_key.txt
#     docker compose up -d
#
#   View logs:
#     docker compose logs -f api
#
#   Stop:
#     docker compose down
#
#   Deploy agent on a laptop (from laptop, run in PowerShell as Admin):
#     .\scripts\deploy_endpoint.ps1 -ServerIP <THIS_SERVER_IP> -RegistrationPassword <PASS>
#
# ══════════════════════════════════════════════════════════════

# version: "3.8"

services:
  # ── WAZUH SIEM STACK ──────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.0
    hostname: wazuh-manager
    # Wrap the image's /init so we patch ossec.conf *before* wazuh-control
    # starts. The patch enables <use_password> and <logall_json>; both are
    # required by the AI ingestion pipeline and otherwise revert to "no"
    # whenever the wazuh-etc volume is wiped (e.g. `docker compose down -v`).
    # The wrapper exec's /init at the end so Wazuh's normal startup is
    # unchanged. Idempotent — safe to run on every boot.
    entrypoint: ["/bin/bash", "/wazuh-bootstrap-entrypoint.sh"]
    ports:
      - "1514:1514" # Agent communication (laptops connect here)
      - "1515:1515" # Agent registration
      - "55000:55000" # REST API (AI Platform connects here)
    volumes:
      - wazuh-data:/var/ossec/data
      - wazuh-etc:/var/ossec/etc
      # IMPORTANT: bind-mounts to /var/ossec/etc/* trick the image's
      # `mount_permanent_data()` into thinking the volume is already populated,
      # so it skips copying defaults (rules, decoders, shared/, agent.conf).
      # Use /wazuh-config-mount/* instead — that's specifically designed for
      # overlay files and runs *after* defaults are restored.
      - ./secrets/wazuh_registration_password.txt:/wazuh-config-mount/etc/authd.pass:ro
      # The ossec.conf bootstrap wrapper — runs before /init. Now a no-op
      # safety-net because wazuh_manager.conf below already has <use_password>
      # and <logall_json> patched at rest, but kept so a future wipe-of-
      # config still produces a working setup.
      - ./scripts/wazuh-bootstrap-entrypoint.sh:/wazuh-bootstrap-entrypoint.sh:ro
      # cont-init.d hook (runs after 1-config-filebeat, before the filebeat
      # service starts) that enables filebeat's archives input so the FULL event
      # stream ships to the indexer as wazuh-archives-4.x-*. Done here, not in
      # the bootstrap wrapper, because filebeat.yml is generated during /init and
      # restarting filebeat would halt the whole manager container.
      - ./config/wazuh_cluster/enable-filebeat-archives.sh:/etc/cont-init.d/99-enable-filebeat-archives:ro
      # Source-of-truth ossec.conf — copied by cont-init.d into /var/ossec/etc/
      # on first boot. The two `<use_password>yes` + `<logall_json>yes` toggles
      # required by the AI pipeline are baked in (see file on host).
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf:ro
      # ── Wazuh 4.7 stack TLS (filebeat → indexer) ──
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key:ro
    environment:
      - WAZUH_CLUSTER_DISABLED=true
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:55000/ || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
    networks:
      internal-net:
        aliases:
          - wazuh.manager   # certs are issued for this name (config/certs.yml)
      agent-net: {}

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.0
    hostname: wazuh-indexer
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "bootstrap.memory_lock=true"
      - "discovery.type=single-node"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      # ── Upstream TLS + opensearch security configs ──
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.key:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem:ro
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem:ro
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml:ro
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      internal-net:
        aliases:
          - wazuh.indexer   # cert CN — required for dashboard → indexer TLS

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.0
    hostname: wazuh-dashboard
    ports:
      - "5601:5601" # SOC analysts access this
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem:ro
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      internal-net:
        aliases:
          - wazuh.dashboard

  # ── AI THREAT HUNTING PLATFORM ────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: threat-platform-api
    user: "1000:1000" # SR-06: non-root (matches Dockerfile)
    read_only: true # SR-06: read-only rootfs
    ports:
      - "8000:8000" # REST API
    volumes:
      - ./config:/app/config:ro
      # Writable so the auto-retrain scheduler can save new staged versions
      # (each cycle creates detection/models/<name>/v<ts>/). Active versions
      # are still verified via HMAC signatures on load, so a tampered file
      # would fail the integrity check at registry.hot_reload() time.
      - ./detection/models:/app/detection/models
      # Mount the compose file read-only so /admin/hardening (which runs
      # scripts/audit_compose_hardening.py inside the container) can audit
      # it. Without this the script fails with "docker-compose.yml not found".
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - platform-data:/app/data # writable model/audit/alert state
    tmpfs:
      - /tmp:size=64M,mode=1777 # scratch (read_only rootfs forbids /tmp writes)
    depends_on:
      wazuh-manager:
        condition: service_healthy
    environment:
      - CONFIG_DIR=config
      - DATA_DIR=data
      - LOG_LEVEL=INFO
      - DETECTION_LOOP_ENABLED=true
      # Wazuh Indexer (OpenSearch) creds. Ingestion reads endpoint telemetry
      # from the indexer, not the Manager API. Must match the indexer admin
      # credentials (same values the manager/dashboard services use above).
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      # The host's LAN IP, injected by ./scripts/pair-up.sh. Used by the
      # companion-app QR endpoint so phones can reach the api over WiFi
      # without the operator hand-editing config/notifications.yml.
      - PUBLIC_HOST_URL=${PUBLIC_HOST_URL:-}
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true # SR-06: no privesc via setuid
    cap_drop:
      - ALL # SR-06: drop ALL Linux capabilities
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    #pids_limit: 256 # cap process count (defence vs fork bombs)
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; r=httpx.get('http://localhost:8000/health'); exit(0 if r.status_code==200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal-net

  # ── ATTACK GRAPH VISUALIZATION ────────────────────────
  visualization:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: attack-graph-viz
    user: "1000:1000"
    read_only: true
    ports:
      - "8080:8080" # Standalone attack graph viewer
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "visualization.web:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    volumes:
      - platform-data:/app/data:ro # graph snapshots are read-only here
    tmpfs:
      - /tmp:size=32M,mode=1777
    depends_on:
      - api
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    #pids_limit: 64
    networks:
      - internal-net

volumes:
  wazuh-data:
  wazuh-etc:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
  platform-data:

networks:
  internal-net:
    driver: bridge
  agent-net:
    driver: bridge
