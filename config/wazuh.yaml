# Wazuh Manager connection settings
# Used by: ingestion/wazuh_connector.py, alert_manager/wazuh_publisher.py
wazuh:
  manager:
    # Central server address — change this to your Wazuh Manager IP/hostname
    host: "localhost"
    api_port: 55000
    api_protocol: "https"
    # Agent registration port (for laptops connecting to this server)
    agent_port: 1514

  credentials:
    # For FYP dev: inline credentials. Production: use Docker secrets.
    username: "wazuh-wui"
    password: "${WAZUH_API_PASSWORD}"    # Resolved from env var or Docker secret

  api:
    verify_ssl: false                     # false for self-signed certs in Docker
    timeout_seconds: 30
    max_retries: 3
    circuit_breaker_threshold: 5          # Open circuit after 5 consecutive failures
    circuit_breaker_reset_seconds: 60     # Try again after 60s

  # Dashboard (for alert viewing by SOC analysts)
  dashboard:
    port: 5601
