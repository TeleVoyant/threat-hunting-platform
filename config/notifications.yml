# Notification system defaults — read at API startup, exposed via
# app.state.notifications_config.
default_min_severity: "high"   # users with no row in notification_prefs default to this
dedup_window_minutes: 5

# Phone validation:
#   false → strict TZ: ^255\d{9}$ (12 digits)
#   true  → loose: ^\d{8,15}$
allow_international_phones: false

# Dashboard URL embedded in the email + SMS body so the analyst can click
# through. ONLY used as a fallback — at runtime the api prefers the
# PUBLIC_HOST_URL env var (set by scripts/pair-up.sh from the current wlp*
# IP). Change this only for production deployments with a stable hostname.
dashboard_url: "http://localhost:8000"

# Daily SMS cost guard rail — sends beyond this in a UTC day are silently
# skipped (notification row records sms_status="skipped:daily_cap"; SSE/email
# still fire).
max_sms_per_day: 200

# Beem sender ID (must be pre-registered with Beem).
beem:
  sender_id: "APT-THP"
  base_url: "https://apisms.beem.africa"

# SMTP — values supplied from .env at runtime (SMTP_HOST etc.).
smtp:
  starttls: true
  from_addr: "apt-thp@localhost"

# Companion-app enrolment.
enroll:
  jwt_ttl_seconds: 600           # 10 minutes
