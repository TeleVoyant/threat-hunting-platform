# config/federated.yaml
federated_learning:
  enabled: true
  server:
    port: 8888
    num_rounds: 10
    min_clients: 2

  privacy:
    differential_privacy: true
    epsilon: 1.0
    gradient_clipping: true
    max_grad_norm: 1.0

  clients:
    - name: "udom_it"
      data_path: "training/data/partition_1"
    - name: "udom_library"
      data_path: "training/data/partition_2"
    - name: "external_org"
      data_path: "training/data/partition_3"
