<svg viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="dd1" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#334155"/></marker>
  </defs>

  <text x="600" y="25" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">Deployment Diagram — FYP Demo Setup (Single Machine)</text>
  <text x="600" y="44" font-size="11" text-anchor="middle" fill="#64748b">Everything runs on one development machine using Docker Compose • Simulates multi-org FL</text>

  <!-- ══ PHYSICAL MACHINE ══ -->
  <g transform="translate(30, 65)">
    <path d="M 0,20 L 15,5 L 1125,5 L 1125,710 L 1110,725 L 0,725 Z" fill="#f8fafc" stroke="#475569" stroke-width="2.5"/>
    <path d="M 1125,5 L 1110,20 L 0,20" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
    <path d="M 1125,5 L 1125,710 L 1110,725 L 1110,20" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>

    <text x="555" y="42" font-size="14" font-weight="bold" text-anchor="middle" fill="#0f172a">«device» Development Machine / UDOM Lab Server</text>
    <text x="555" y="58" font-size="10" text-anchor="middle" fill="#475569">Ubuntu 22.04 • Intel i7/Xeon 8+ cores • 16-32GB RAM • Docker + Docker Compose installed</text>

    <!-- ── Step-by-step run commands ── -->
    <rect x="20" y="70" width="1090" height="55" rx="6" fill="#1e293b"/>
    <text x="40" y="88" font-size="10" font-family="monospace" fill="#4ade80">$ cp .env.example .env                        # 1. Configure secrets</text>
    <text x="40" y="103" font-size="10" font-family="monospace" fill="#4ade80">$ docker compose up -d                         # 2. Start all services (one command!)</text>
    <text x="40" y="118" font-size="10" font-family="monospace" fill="#4ade80">$ docker compose logs -f api                   # 3. Watch detection loop</text>

    <!-- ══ Docker Compose Services ══ -->

    <!-- Row 1: Wazuh Stack -->
    <rect x="20" y="140" width="350" height="185" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="195" y="160" font-size="11" font-weight="bold" text-anchor="middle" fill="#92400e">Wazuh Stack</text>

    <rect x="30" y="170" width="160" height="55" rx="5" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="110" y="188" font-size="9" font-weight="bold" text-anchor="middle" fill="#92400e">wazuh-manager</text>
    <text x="110" y="200" font-size="8" text-anchor="middle" fill="#b45309">:1514 (agents)</text>
    <text x="110" y="212" font-size="8" text-anchor="middle" fill="#b45309">:55000 (API)</text>

    <rect x="200" y="170" width="160" height="55" rx="5" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="280" y="188" font-size="9" font-weight="bold" text-anchor="middle" fill="#92400e">wazuh-indexer</text>
    <text x="280" y="200" font-size="8" text-anchor="middle" fill="#b45309">OpenSearch</text>
    <text x="280" y="212" font-size="8" text-anchor="middle" fill="#b45309">:9200 (internal)</text>

    <rect x="30" y="235" width="330" height="40" rx="5" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="195" y="253" font-size="9" font-weight="bold" text-anchor="middle" fill="#92400e">wazuh-dashboard</text>
    <text x="195" y="268" font-size="8" text-anchor="middle" fill="#b45309">http://localhost:5601 — SOC alerts here</text>

    <rect x="30" y="282" width="330" height="30" rx="4" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
    <text x="195" y="301" font-size="8" text-anchor="middle" fill="#14532d">Networks: internal-net + agent-net</text>

    <!-- Row 1: AI Platform -->
    <rect x="390" y="140" width="350" height="185" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="565" y="160" font-size="11" font-weight="bold" text-anchor="middle" fill="#14532d">⭐ AI Threat Hunting Platform</text>

    <rect x="400" y="170" width="165" height="55" rx="5" fill="white" stroke="#22c55e" stroke-width="1.5"/>
    <text x="482" y="188" font-size="9" font-weight="bold" text-anchor="middle" fill="#14532d">api</text>
    <text x="482" y="200" font-size="8" text-anchor="middle" fill="#166534">FastAPI + Detection Loop</text>
    <text x="482" y="212" font-size="8" text-anchor="middle" fill="#166534">http://localhost:8000</text>

    <rect x="575" y="170" width="155" height="55" rx="5" fill="white" stroke="#22c55e" stroke-width="1.5"/>
    <text x="652" y="188" font-size="9" font-weight="bold" text-anchor="middle" fill="#14532d">visualization</text>
    <text x="652" y="200" font-size="8" text-anchor="middle" fill="#166534">Attack Graph Viewer</text>
    <text x="652" y="212" font-size="8" text-anchor="middle" fill="#166534">http://localhost:8080</text>

    <rect x="400" y="235" width="330" height="40" rx="5" fill="white" stroke="#22c55e" stroke-width="1.5"/>
    <text x="565" y="253" font-size="9" font-weight="bold" text-anchor="middle" fill="#14532d">Detection: XGBoost LM + XGBoost DNS</text>
    <text x="565" y="268" font-size="8" text-anchor="middle" fill="#166534">Feature Pipeline (6) → Registry (2 plugins) → SHAP → Alert</text>

    <rect x="400" y="282" width="330" height="30" rx="4" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
    <text x="565" y="301" font-size="8" text-anchor="middle" fill="#14532d">Network: internal-net • Connects to Wazuh API</text>

    <!-- Row 1: FL Stack -->
    <rect x="760" y="140" width="350" height="185" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="935" y="160" font-size="11" font-weight="bold" text-anchor="middle" fill="#5b21b6">Federated Learning Stack</text>

    <rect x="770" y="170" width="330" height="40" rx="5" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="935" y="188" font-size="9" font-weight="bold" text-anchor="middle" fill="#5b21b6">fl-server (Flower)</text>
    <text x="935" y="203" font-size="8" text-anchor="middle" fill="#6d28d9">Aggregation + Trust Manager • :8888 (fl-net only)</text>

    <rect x="770" y="220" width="105" height="40" rx="5" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="822" y="238" font-size="8" font-weight="bold" text-anchor="middle" fill="#5b21b6">fl-client</text>
    <text x="822" y="252" font-size="7" text-anchor="middle" fill="#6d28d9">UDOM (real)</text>

    <rect x="883" y="220" width="105" height="40" rx="5" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="935" y="238" font-size="8" font-weight="bold" text-anchor="middle" fill="#5b21b6">fl-client</text>
    <text x="935" y="252" font-size="7" text-anchor="middle" fill="#6d28d9">Hospital (sim)</text>

    <rect x="996" y="220" width="95" height="40" rx="5" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1043" y="238" font-size="8" font-weight="bold" text-anchor="middle" fill="#5b21b6">fl-client</text>
    <text x="1043" y="252" font-size="7" text-anchor="middle" fill="#6d28d9">Bank (sim)</text>

    <rect x="770" y="268" width="330" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
    <text x="935" y="283" font-size="8" text-anchor="middle" fill="#991b1b">🔒 DP ε=1.0 • Trust scoring • Data volumes read-only</text>

    <rect x="770" y="295" width="330" height="22" rx="4" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
    <text x="935" y="310" font-size="8" text-anchor="middle" fill="#5b21b6">Network: fl-net (internal, isolated from internet)</text>

    <!-- ══ Simulated Test Laptops ══ -->
    <rect x="20" y="345" width="1090" height="150" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="555" y="368" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Simulated Endpoints (for FYP testing without real laptops)</text>

    <rect x="40" y="380" width="1060" height="55" rx="5" fill="#1e293b"/>
    <text x="60" y="398" font-size="9" font-family="monospace" fill="#4ade80"># Option A: Run Atomic Red Team to simulate APT attacks → generates real Sysmon/WinEvent data</text>
    <text x="60" y="413" font-size="9" font-family="monospace" fill="#4ade80">$ docker exec wazuh-manager /var/ossec/bin/manage_agents -a   # Register test agent</text>
    <text x="60" y="428" font-size="9" font-family="monospace" fill="#4ade80"># Option B: Replay Mordor dataset events through Wazuh API → simulates real endpoint telemetry</text>

    <rect x="40" y="445" width="1060" height="38" rx="4" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
    <text x="555" y="462" font-size="9" text-anchor="middle" fill="#92400e">For real laptop testing: run scripts/deploy_endpoint.ps1 -ServerIP &lt;THIS_MACHINE_IP&gt; on a Windows machine</text>
    <text x="555" y="476" font-size="9" text-anchor="middle" fill="#92400e">The Wazuh Agent will connect to wazuh-manager on port 1514 and start shipping telemetry</text>

    <!-- ══ Access Points Summary ══ -->
    <rect x="20" y="510" width="1090" height="130" rx="8" fill="white" stroke="#475569" stroke-width="2"/>
    <text x="555" y="530" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">Access Points (after docker compose up -d)</text>

    <rect x="40" y="545" width="250" height="40" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="165" y="562" font-size="10" font-weight="bold" text-anchor="middle" fill="#92400e">📊 Wazuh Dashboard</text>
    <text x="165" y="577" font-size="9" text-anchor="middle" fill="#b45309">https://localhost:5601</text>

    <rect x="310" y="545" width="250" height="40" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="435" y="562" font-size="10" font-weight="bold" text-anchor="middle" fill="#14532d">🔌 Platform API + Docs</text>
    <text x="435" y="577" font-size="9" text-anchor="middle" fill="#166534">http://localhost:8000/docs</text>

    <rect x="580" y="545" width="250" height="40" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="705" y="562" font-size="10" font-weight="bold" text-anchor="middle" fill="#14532d">🔍 Attack Graph Viewer</text>
    <text x="705" y="577" font-size="9" text-anchor="middle" fill="#166534">http://localhost:8080</text>

    <rect x="850" y="545" width="250" height="40" rx="5" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="975" y="562" font-size="10" font-weight="bold" text-anchor="middle" fill="#5b21b6">🤝 FL Server (internal)</text>
    <text x="975" y="577" font-size="9" text-anchor="middle" fill="#6d28d9">fl-server:8888 (Docker network only)</text>

    <rect x="40" y="595" width="1060" height="30" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
    <text x="555" y="615" font-size="9" text-anchor="middle" fill="#991b1b">🔒 API requires JWT/API-Key header • Dashboard requires Wazuh credentials • FL is internal-only (no external port exposed)</text>

    <!-- ══ Key FYP Demo Metrics ══ -->
    <rect x="20" y="645" width="1090" height="65" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="555" y="665" font-size="11" font-weight="bold" text-anchor="middle" fill="#14532d">Key FYP Demo Proof Points</text>
    <text x="555" y="683" font-size="9" text-anchor="middle" fill="#166534">1. Lateral movement detected (XGBoost Model A, precision ≥85%) • 2. DNS exfiltration detected (XGBoost Model B)</text>
    <text x="555" y="698" font-size="9" text-anchor="middle" fill="#166534">3. FL global model outperforms any single client's local model • 4. Attack graph visualizes full kill chain • 5. All actions audited</text>
  </g>

  <!-- Total resources note -->
  <rect x="30" y="810" width="1140" height="30" rx="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="600" y="830" font-size="9" text-anchor="middle" fill="#475569">Total resources: ~10 containers • ~12GB RAM • ~20GB disk • Ports: 1514, 5601, 8000, 8080 exposed • All others internal • Deploy time: ~3 minutes</text>
</svg>
